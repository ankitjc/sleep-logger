version: "3.9"

services:
  db:
    image: postgres:16
    container_name: sleeplogger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sleeplogger
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: sleeplogger-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sleeplogger
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres